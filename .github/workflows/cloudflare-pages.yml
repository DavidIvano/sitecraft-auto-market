name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build
        env:
          PUBLIC_XANO_API_URL: ${{ vars.PUBLIC_XANO_API_URL }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}

      - name: Deploy
        if: ${{ env.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name sitecraft-auto-market --branch main

      - name: Skip deploy without Cloudflare token
        if: ${{ env.CF_API_TOKEN == '' }}
        run: echo "Set CLOUDFLARE_API_TOKEN in GitHub Secrets to enable automatic Cloudflare deploys."
